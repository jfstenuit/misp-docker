# This works as a minimum viable db, but is not recommended.
# NOT OpenShift-safe: this is the stock Docker Hub `mariadb` image, which
# needs to run as root once to initialize an empty/fresh datadir before it
# can drop to its own non-root user - a pattern OpenShift's restricted SCC
# (no root, arbitrary UID) does not allow. Use the Helm chart's
# bitnamilegacy-backed mariadb subchart for OpenShift deployments instead
# (see kubernetes/helm-chart/DEPLOYMENT.md for the tradeoffs of that image
# source).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app.kubernetes.io/name: misp-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: misp-mysql
  serviceName: "misp-mysql"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: misp-mysql
    spec:
      containers:
        - name: misp-mysql
          image: "mariadb:10.11"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 3306
            name: misp-mysql
            protocol: TCP
          resources: {}
          envFrom:
            - secretRef:
                name: mysql-credentials
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-data
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 15Gi
